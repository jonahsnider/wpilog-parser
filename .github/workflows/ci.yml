name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 'lts'
          cache: true
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run check
      - name: Build
        run: bun run build
      - name: Test
        run: bun run test
